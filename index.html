const QA=[
{id:'1',chapter:'ch1',years:'2023',tags:['definition'],q:'What is e-commerce? What are its types?',body:`<p><strong>E-Commerce (Electronic Commerce)</strong> means buying and selling of goods and services over the internet or other electronic networks.</p><table><tr><th>Type</th><th>Description</th><th>Example</th></tr><tr><td><strong>B2C</strong></td><td>Business to Consumer — a company sells directly to individual customers.</td><td>Daraz, Amazon</td></tr><tr><td><strong>B2B</strong></td><td>Business to Business — one company sells to another company.</td><td>Alibaba, manufacturers selling to retailers</td></tr><tr><td><strong>C2C</strong></td><td>Consumer to Consumer — individuals sell to each other.</td><td>eBay, Facebook Marketplace</td></tr><tr><td><strong>C2B</strong></td><td>Consumer to Business — individuals offer services/products to companies.</td><td>Freelancers on Upwork</td></tr><tr><td><strong>B2G</strong></td><td>Business to Government — businesses sell to government agencies.</td><td>Government procurement portals</td></tr></table>`},
{id:'2',chapter:'ch1',years:'2023,2024',tags:['definition','models'],q:'What are the advantages and disadvantages of e-commerce?',body:`<table><tr><th>Advantages</th><th>Disadvantages</th></tr><tr><td>Open 24/7 — customers shop anytime</td><td>No physical touch/feel of products</td></tr><tr><td>Global reach — sell anywhere in the world</td><td>Security risks — hacking, fraud</td></tr><tr><td>Lower costs — no rent for physical store</td><td>Dependence on internet connectivity</td></tr><tr><td>Easy comparison shopping for customers</td><td>Delivery delays and logistics problems</td></tr><tr><td>Personalized recommendations via data</td><td>Returns and refunds are complicated</td></tr><tr><td>Instant payment and faster checkout</td><td>Trust issues for new customers</td></tr></table>`},
{id:'3',chapter:'ch1',years:'2022,2023',tags:['models','definition'],q:'Explain the B2B e-commerce model with examples.',body:`<p><strong>B2B (Business-to-Business)</strong> e-commerce involves transactions between two businesses rather than between a business and a consumer.</p><table><tr><th>Feature</th><th>Details</th></tr><tr><td>Buyers</td><td>Companies, wholesalers, retailers, manufacturers</td></tr><tr><td>Order volume</td><td>Large bulk orders</td></tr><tr><td>Pricing</td><td>Negotiated, often with discounts for large orders</td></tr><tr><td>Payment</td><td>Credit terms, invoicing, bank transfers</td></tr><tr><td>Examples</td><td>Alibaba, ThomasNet, industry-specific portals</td></tr></table><p><strong>Example in Bangladesh:</strong> A garment factory ordering fabric from a textile supplier through an online B2B portal.</p>`},
{id:'4',chapter:'ch1',years:'2024',tags:['definition','marketing'],q:'What is digital marketing? What are its tools?',body:`<p><strong>Digital marketing</strong> means promoting products and services using digital channels and the internet.</p><table><tr><th>Tool</th><th>Description</th></tr><tr><td><strong>SEO</strong></td><td>Improving website ranking on Google search results organically</td></tr><tr><td><strong>SEM / PPC</strong></td><td>Paid ads on search engines like Google Ads</td></tr><tr><td><strong>Social Media</strong></td><td>Marketing on Facebook, Instagram, YouTube, TikTok</td></tr><tr><td><strong>Email Marketing</strong></td><td>Sending promotional emails to a subscriber list</td></tr><tr><td><strong>Content Marketing</strong></td><td>Blogs, videos, infographics to attract customers</td></tr><tr><td><strong>Affiliate Marketing</strong></td><td>Partners earn commission by promoting your products</td></tr><tr><td><strong>Influencer Marketing</strong></td><td>Paying popular social media figures to promote products</td></tr></table>`},
{id:'5',chapter:'ch1',years:'2022',tags:['marketing','definition'],q:'What is SEO? How does it work?',body:`<p><strong>SEO (Search Engine Optimization)</strong> is the process of improving a website so it appears higher in search engine results pages (SERPs) like Google, without paying for ads.</p><table><tr><th>Type</th><th>Techniques</th></tr><tr><td><strong>On-Page SEO</strong></td><td>Using keywords in titles, headings, content, image alt tags</td></tr><tr><td><strong>Off-Page SEO</strong></td><td>Getting backlinks from other websites, social sharing</td></tr><tr><td><strong>Technical SEO</strong></td><td>Fast loading speed, mobile-friendliness, secure HTTPS</td></tr></table><p>Google's algorithm checks 200+ factors to rank pages. Higher ranking = more free traffic = more sales.</p>`},
{id:'6',chapter:'ch1',years:'2023',tags:['definition'],q:'What is an online payment system? Name common types.',body:`<p>An <strong>online payment system</strong> allows customers to pay for products and services electronically over the internet.</p><table><tr><th>Type</th><th>Example</th></tr><tr><td>Credit/Debit Card</td><td>Visa, Mastercard</td></tr><tr><td>Mobile Banking</td><td>bKash, Nagad, Rocket (Bangladesh)</td></tr><tr><td>Digital Wallets</td><td>PayPal, Google Pay, Apple Pay</td></tr><tr><td>Net Banking</td><td>Online bank transfer</td></tr><tr><td>Cash on Delivery</td><td>Still popular in Bangladesh</td></tr><tr><td>Cryptocurrency</td><td>Bitcoin (limited use)</td></tr></table>`},
{id:'7',chapter:'ch1',years:'2024',tags:['models'],q:'What is a supply chain in e-commerce? How is it managed?',body:`<p>A <strong>supply chain</strong> is the complete journey of a product — from raw materials to the customer's hands.</p><table><tr><th>Stage</th><th>Activity</th></tr><tr><td>Supplier</td><td>Provides raw materials or finished goods</td></tr><tr><td>Manufacturer</td><td>Produces the product</td></tr><tr><td>Warehouse</td><td>Stores inventory until ordered</td></tr><tr><td>Fulfillment</td><td>Picks, packs, and prepares orders</td></tr><tr><td>Delivery</td><td>Ships to customer's address</td></tr><tr><td>Returns</td><td>Handles returns and refunds</td></tr></table><p><strong>Supply Chain Management (SCM)</strong> uses software to coordinate all these steps, reduce costs, and ensure fast, accurate delivery.</p>`},
{id:'8',chapter:'ch1',years:'2022,2024',tags:['definition','governance'],q:'What is e-governance? What are its benefits?',body:`<p><strong>E-Governance</strong> means using digital technology (internet, computers, mobile) to deliver government services to citizens efficiently.</p><table><tr><th>Benefit</th><th>Explanation</th></tr><tr><td>Convenience</td><td>Citizens can access services from home, 24/7</td></tr><tr><td>Transparency</td><td>Reduces corruption by creating digital records</td></tr><tr><td>Speed</td><td>Applications and approvals are processed faster</td></tr><tr><td>Cost reduction</td><td>Less paper, fewer staff needed for manual processing</td></tr><tr><td>Accessibility</td><td>Reaches rural citizens who can't travel to offices</td></tr></table><p><strong>Examples in Bangladesh:</strong> NID services, birth registration, land records, e-TIN, and online passport applications.</p>`},
{id:'9',chapter:'ch1',years:'2023',tags:['governance'],q:'What is the Digital Bangladesh concept?',body:`<p><strong>Digital Bangladesh</strong> was a government vision (launched in 2008) to transform Bangladesh into a knowledge-based digital society by 2021. It was built on four pillars:</p><table><tr><th>Pillar</th><th>Goal</th></tr><tr><td>Digital Government</td><td>Provide all public services online</td></tr><tr><td>ICT in Business</td><td>Encourage tech-based industries and exports</td></tr><tr><td>Human Resource Development</td><td>Train citizens in digital skills</td></tr><tr><td>IT Infrastructure</td><td>Expand broadband, fiber optics, mobile internet</td></tr></table><p>Key achievements: Union Digital Centers, Mobile Financial Services growth, e-Government portals, software export industry.</p>`},
{id:'10',chapter:'ch1',years:'2022',tags:['definition'],q:'What is cloud computing? How is it used in e-commerce?',body:`<p><strong>Cloud computing</strong> means accessing computing resources (servers, storage, databases, software) over the internet, instead of owning physical hardware.</p><table><tr><th>Service Type</th><th>Description</th><th>E-Commerce Use</th></tr><tr><td><strong>IaaS</strong></td><td>Infrastructure as a Service — virtual servers</td><td>Hosting the e-commerce website</td></tr><tr><td><strong>PaaS</strong></td><td>Platform as a Service — development environments</td><td>Building apps and software</td></tr><tr><td><strong>SaaS</strong></td><td>Software as a Service — ready-made applications</td><td>Using Shopify, accounting tools</td></tr></table><p>E-commerce uses cloud to scale up during sales peaks (like Eid), store product images, process payments, and analyze customer data.</p>`},
{id:'11',chapter:'ch1',years:'2024',tags:['definition','models'],q:'What is dropshipping? How does it differ from traditional retail?',body:`<p><strong>Dropshipping</strong> is an e-commerce model where the seller never holds inventory. When a customer orders, the seller forwards the order directly to a supplier who ships to the customer.</p><table><tr><th>Feature</th><th>Dropshipping</th><th>Traditional Retail</th></tr><tr><td>Inventory</td><td>None — supplier holds stock</td><td>Must buy and store goods</td></tr><tr><td>Capital needed</td><td>Very low — no stock purchase</td><td>High — must buy inventory upfront</td></tr><tr><td>Profit margin</td><td>Lower per item</td><td>Higher per item</td></tr><tr><td>Risk</td><td>Low — unsold stock not a problem</td><td>High — unsold stock is a loss</td></tr><tr><td>Control</td><td>Less — depends on supplier</td><td>Full control over products</td></tr></table>`},
{id:'12',chapter:'ch1',years:'2023',tags:['marketing'],q:'What is CRM (Customer Relationship Management) in e-commerce?',body:`<p><strong>CRM</strong> is a strategy and software system used by businesses to manage interactions with current and potential customers to improve satisfaction and increase sales.</p><table><tr><th>Function</th><th>How it helps e-commerce</th></tr><tr><td>Customer data storage</td><td>Tracks purchase history, preferences, contact info</td></tr><tr><td>Personalization</td><td>Sends targeted offers based on past purchases</td></tr><tr><td>Customer service</td><td>Tracks complaints and resolves issues faster</td></tr><tr><td>Email campaigns</td><td>Automates promotional emails and reminders</td></tr><tr><td>Sales forecasting</td><td>Predicts future buying patterns from data</td></tr></table><p>Example tools: Salesforce, HubSpot, Zoho CRM.</p>`},
{id:'13',chapter:'ch1',years:'2022',tags:['definition'],q:'What is m-commerce? How is it different from e-commerce?',body:`<p><strong>M-Commerce (Mobile Commerce)</strong> is e-commerce conducted specifically on mobile devices (smartphones, tablets).</p><table><tr><th>Feature</th><th>E-Commerce</th><th>M-Commerce</th></tr><tr><td>Device</td><td>Any internet device (PC, laptop)</td><td>Mobile devices only</td></tr><tr><td>Access method</td><td>Browser or app</td><td>Mostly apps</td></tr><tr><td>Location</td><td>Mainly stationary</td><td>Anywhere, on the go</td></tr><tr><td>Payment</td><td>Cards, bank transfer</td><td>Mobile wallets, bKash, tap-to-pay</td></tr><tr><td>Features</td><td>Standard web features</td><td>GPS, push notifications, camera scanning</td></tr></table><p>In Bangladesh, m-commerce is dominant because most users access the internet via smartphones.</p>`},
{id:'14',chapter:'ch1',years:'2024',tags:['models','definition'],q:'What is a marketplace platform? Give examples.',body:`<p>A <strong>marketplace platform</strong> is an online platform where multiple sellers can list and sell their products, and buyers can browse and purchase from many sellers in one place. The platform earns commission from each sale.</p><table><tr><th>Marketplace</th><th>Type</th><th>Country</th></tr><tr><td>Amazon</td><td>General — products of all kinds</td><td>Global</td></tr><tr><td>Alibaba</td><td>B2B wholesale</td><td>Global</td></tr><tr><td>Daraz</td><td>General consumer marketplace</td><td>South/Southeast Asia</td></tr><tr><td>Shohoz</td><td>Travel, food, rides</td><td>Bangladesh</td></tr><tr><td>Pathao</td><td>Delivery, rides, food</td><td>Bangladesh</td></tr></table>`},
{id:'15',chapter:'ch1',years:'2022,2023',tags:['definition'],q:'What are the key components of an e-commerce website?',body:`<table><tr><th>Component</th><th>Purpose</th></tr><tr><td><strong>Product Catalog</strong></td><td>Displays products with images, descriptions, prices</td></tr><tr><td><strong>Shopping Cart</strong></td><td>Lets customers collect items before buying</td></tr><tr><td><strong>Payment Gateway</strong></td><td>Processes card/mobile payments securely</td></tr><tr><td><strong>User Accounts</strong></td><td>Customers save addresses and order history</td></tr><tr><td><strong>Search & Filters</strong></td><td>Helps customers find products quickly</td></tr><tr><td><strong>Order Management</strong></td><td>Tracks orders from placement to delivery</td></tr><tr><td><strong>Reviews & Ratings</strong></td><td>Builds trust, helps other buyers decide</td></tr><tr><td><strong>SSL Certificate</strong></td><td>Secures data with HTTPS encryption</td></tr></table>`},
{id:'16',chapter:'ch1',years:'2023',tags:['definition','governance'],q:'What is intellectual property in e-commerce?',body:`<p><strong>Intellectual Property (IP)</strong> refers to creations of the mind — inventions, designs, brand names, logos, software, and creative content — that are legally protected.</p><table><tr><th>IP Type</th><th>Protects</th><th>E-Commerce Relevance</th></tr><tr><td><strong>Copyright</strong></td><td>Creative works — images, text, music, software</td><td>Product photos, website content, app code</td></tr><tr><td><strong>Trademark</strong></td><td>Brand names, logos, slogans</td><td>Brand identity, domain names</td></tr><tr><td><strong>Patent</strong></td><td>Inventions and unique technologies</td><td>Patented checkout algorithms</td></tr><tr><td><strong>Trade Secret</strong></td><td>Confidential business information</td><td>Customer databases, pricing algorithms</td></tr></table><p>E-commerce businesses must ensure they don't use others' IP without permission, and protect their own.</p>`},
{id:'17',chapter:'ch1',years:'2022',tags:['governance','definition'],q:'What is cybercrime? What are common types in e-commerce?',body:`<table><tr><th>Type</th><th>Description</th></tr><tr><td><strong>Phishing</strong></td><td>Fake emails/websites trick users into giving passwords or card details</td></tr><tr><td><strong>Identity Theft</strong></td><td>Stealing personal info to make unauthorized purchases</td></tr><tr><td><strong>Card Fraud</strong></td><td>Using stolen credit card numbers to buy goods online</td></tr><tr><td><strong>Account Takeover</strong></td><td>Hacking into customer accounts to steal funds or data</td></tr><tr><td><strong>DDoS Attack</strong></td><td>Flooding a website with traffic to crash it</td></tr><tr><td><strong>Fake Reviews</strong></td><td>Posting false reviews to damage competitors or boost own sales</td></tr></table>`},
{id:'18',chapter:'ch1',years:'2024',tags:['marketing','models'],q:'What is affiliate marketing? How does it work in e-commerce?',body:`<p><strong>Affiliate marketing</strong> is a performance-based marketing model where individuals (affiliates) earn a commission by promoting another company's products.</p><p><strong>How it works:</strong></p><table><tr><th>Step</th><th>Action</th></tr><tr><td>1</td><td>Affiliate signs up and gets a unique tracking link</td></tr><tr><td>2</td><td>Affiliate promotes the product on their blog/YouTube/social media</td></tr><tr><td>3</td><td>Customer clicks the link and makes a purchase</td></tr><tr><td>4</td><td>The platform tracks the sale back to the affiliate</td></tr><tr><td>5</td><td>Affiliate earns a commission (usually 5–30%)</td></tr></table><p>Example: Amazon Associates — millions of website owners earn commissions by recommending Amazon products.</p>`},
{id:'19',chapter:'ch1',years:'2023',tags:['definition'],q:'What is a payment gateway? Name some examples.',body:`<p>A <strong>payment gateway</strong> is a technology service that securely authorizes and processes payments between a customer and a merchant in e-commerce transactions.</p><table><tr><th>Step</th><th>What happens</th></tr><tr><td>Customer pays</td><td>Enters card/mobile number on checkout page</td></tr><tr><td>Encryption</td><td>Gateway encrypts the data with SSL/TLS</td></tr><tr><td>Authorization</td><td>Sends to bank to verify funds are available</td></tr><tr><td>Approval</td><td>Bank approves or declines the transaction</td></tr><tr><td>Completion</td><td>Order is confirmed, seller receives funds</td></tr></table><p><strong>Examples:</strong> SSLCommerz, ShurjoPay (Bangladesh), Stripe, PayPal (international).</p>`},
{id:'20',chapter:'ch1',years:'2022',tags:['models','definition'],q:'What is a business model in e-commerce? Name four models.',body:`<p>An e-commerce <strong>business model</strong> defines how a company creates value, delivers products/services, and earns revenue online.</p><table><tr><th>Model</th><th>Description</th><th>Example</th></tr><tr><td><strong>B2C</strong></td><td>Business sells directly to consumers</td><td>Shajgoj, Daraz</td></tr><tr><td><strong>B2B</strong></td><td>Business sells to other businesses</td><td>Alibaba</td></tr><tr><td><strong>C2C</strong></td><td>Consumer sells to consumer</td><td>Bikroy.com</td></tr><tr><td><strong>Subscription</strong></td><td>Monthly/annual fee for service</td><td>Netflix, Spotify</td></tr></table>`},
{id:'21',chapter:'ch2',years:'2023',tags:['security','definition'],q:'What is network security? What are its main goals?',body:`<p><strong>Network security</strong> refers to the policies, technologies, and practices used to protect computer networks and their data from unauthorized access, misuse, or attacks.</p><p><strong>Main goals — the CIA Triad:</strong></p><table><tr><th>Goal</th><th>Meaning</th></tr><tr><td><strong>Confidentiality</strong></td><td>Only authorized people can read the data</td></tr><tr><td><strong>Integrity</strong></td><td>Data cannot be altered without authorization</td></tr><tr><td><strong>Availability</strong></td><td>Data and systems are accessible when needed</td></tr></table><p>Additional goals include authentication (verifying identity) and non-repudiation (proving a transaction occurred).</p>`},
{id:'22',chapter:'ch2',years:'2024',tags:['security'],q:'What is a firewall? How does it protect e-commerce?',body:`<p>A <strong>firewall</strong> is a network security system that monitors and controls incoming and outgoing network traffic based on predefined security rules. It acts as a barrier between a trusted internal network and untrusted external networks like the internet.</p><table><tr><th>Firewall Type</th><th>How it Works</th></tr><tr><td><strong>Packet Filter</strong></td><td>Inspects each data packet and blocks those not matching rules</td></tr><tr><td><strong>Stateful</strong></td><td>Tracks the state of connections and blocks suspicious ones</td></tr><tr><td><strong>Application Layer</strong></td><td>Inspects traffic at the application level (HTTP, FTP, etc.)</td></tr><tr><td><strong>Web Application Firewall (WAF)</strong></td><td>Specifically protects web apps from SQL injection, XSS attacks</td></tr></table>`},
{id:'23',chapter:'ch2',years:'2022',tags:['security','definition'],q:'What is encryption? What are its types?',body:`<p><strong>Encryption</strong> is the process of converting readable data (plaintext) into an unreadable format (ciphertext) using a mathematical algorithm and key, so only authorized parties can read it.</p><table><tr><th>Type</th><th>How it works</th><th>Use case</th></tr><tr><td><strong>Symmetric</strong></td><td>Same key encrypts and decrypts</td><td>AES — encrypting stored data</td></tr><tr><td><strong>Asymmetric</strong></td><td>Public key encrypts, private key decrypts</td><td>RSA — HTTPS, email security</td></tr><tr><td><strong>Hashing</strong></td><td>One-way conversion, cannot be reversed</td><td>Storing passwords (SHA-256)</td></tr></table>`},
{id:'24',chapter:'ch2',years:'2023',tags:['security'],q:'What is SSL/TLS? How does HTTPS work?',body:`<p><strong>SSL (Secure Sockets Layer)</strong> and its modern replacement <strong>TLS (Transport Layer Security)</strong> are cryptographic protocols that encrypt data transmitted between a browser and a web server.</p><p><strong>How HTTPS works (TLS Handshake):</strong></p><table><tr><th>Step</th><th>What happens</th></tr><tr><td>1. Client Hello</td><td>Browser contacts server and lists supported encryption methods</td></tr><tr><td>2. Server Hello</td><td>Server responds with chosen method and its SSL certificate</td></tr><tr><td>3. Certificate check</td><td>Browser verifies certificate is from a trusted authority</td></tr><tr><td>4. Key exchange</td><td>Both sides generate a shared session key</td></tr><tr><td>5. Encrypted data</td><td>All further communication is encrypted with that key</td></tr></table><p>The padlock icon in the browser address bar indicates HTTPS is active.</p>`},
{id:'25',chapter:'ch2',years:'2024',tags:['security','definition'],q:'What is authentication? What are the methods used?',body:`<p><strong>Authentication</strong> is the process of verifying that a user is who they claim to be before granting access to a system.</p><table><tr><th>Method</th><th>Example</th></tr><tr><td><strong>Password</strong></td><td>Username + password login</td></tr><tr><td><strong>OTP (One-Time Password)</strong></td><td>Code sent via SMS or email</td></tr><tr><td><strong>Two-Factor Authentication (2FA)</strong></td><td>Password + OTP or app code</td></tr><tr><td><strong>Biometrics</strong></td><td>Fingerprint, face recognition</td></tr><tr><td><strong>Digital Certificate</strong></td><td>Cryptographic proof of identity</td></tr><tr><td><strong>CAPTCHA</strong></td><td>Distinguishes humans from bots</td></tr></table>`},
{id:'26',chapter:'ch1',years:'2023',tags:['security','definition'],q:'What are the key challenges of web store requirements in e-commerce?',body:`<table><tr><th>Challenge</th><th>Explanation</th></tr><tr><td><strong>Security</strong></td><td>Protecting customer payment data from hackers requires SSL certificates and firewalls.</td></tr><tr><td><strong>Performance</strong></td><td>Website must load fast — slow pages lose customers. Every second of delay costs sales.</td></tr><tr><td><strong>Mobile-friendly design</strong></td><td>Must work perfectly on smartphones since most users in Bangladesh shop on mobile.</td></tr><tr><td><strong>Payment integration</strong></td><td>Must accept bKash, Nagad, cards, and COD — integrating all these is technically complex.</td></tr><tr><td><strong>Inventory sync</strong></td><td>Website stock must match actual warehouse stock in real time to avoid overselling.</td></tr><tr><td><strong>Customer trust</strong></td><td>Showing reviews, return policies, and contact info convinces buyers the store is genuine.</td></tr><tr><td><strong>SEO and visibility</strong></td><td>Getting the store to appear on Google so people can find it organically.</td></tr><tr><td><strong>Logistics</strong></td><td>Connecting with delivery partners, tracking orders, and handling returns smoothly.</td></tr></table>`},
{id:'27',chapter:'ch2',years:'2022',tags:['security'],q:'What is a VPN? How does it improve security?',body:`<p>A <strong>VPN (Virtual Private Network)</strong> creates an encrypted tunnel between the user's device and the internet, hiding the user's real IP address and encrypting all traffic.</p><table><tr><th>Feature</th><th>Benefit</th></tr><tr><td>Encryption</td><td>All data is encrypted, safe from eavesdropping</td></tr><tr><td>IP masking</td><td>Hides true location, protecting privacy</td></tr><tr><td>Secure remote access</td><td>Employees can safely access company networks from home</td></tr><tr><td>Bypass geo-restrictions</td><td>Access content blocked in certain countries</td></tr></table>`},
{id:'28',chapter:'ch2',years:'2023',tags:['security','definition'],q:'What is a digital signature? How does it work?',body:`<p>A <strong>digital signature</strong> is an electronic verification mechanism that proves the authenticity and integrity of a digital document or transaction.</p><table><tr><th>Step</th><th>What happens</th></tr><tr><td>1. Hashing</td><td>The document is processed through a hash function to create a unique digest</td></tr><tr><td>2. Signing</td><td>The sender encrypts the hash with their <strong>private key</strong></td></tr><tr><td>3. Sending</td><td>The document + encrypted hash is sent to the receiver</td></tr><tr><td>4. Verification</td><td>Receiver decrypts the hash with sender's <strong>public key</strong></td></tr><tr><td>5. Comparison</td><td>If the hash matches the document, signature is valid</td></tr></table><p>Digital signatures are used in e-contracts, banking transactions, and government e-services.</p>`},
{id:'29',chapter:'ch2',years:'2024',tags:['security'],q:'What is malware? What are the different types?',body:`<table><tr><th>Type</th><th>Description</th></tr><tr><td><strong>Virus</strong></td><td>Attaches to files and spreads when those files are shared</td></tr><tr><td><strong>Worm</strong></td><td>Self-replicates and spreads across networks without user action</td></tr><tr><td><strong>Trojan Horse</strong></td><td>Disguised as legitimate software but hides malicious code</td></tr><tr><td><strong>Ransomware</strong></td><td>Encrypts files and demands payment to unlock them</td></tr><tr><td><strong>Spyware</strong></td><td>Silently monitors user activity and sends data to attackers</td></tr><tr><td><strong>Adware</strong></td><td>Shows unwanted ads, often bundled with free software</td></tr><tr><td><strong>Keylogger</strong></td><td>Records every keystroke to steal passwords</td></tr></table>`},
{id:'30',chapter:'ch2',years:'2022,2023',tags:['security','definition'],q:'What is a cookie in web security? How can it be exploited?',body:`<p>A <strong>cookie</strong> is a small text file stored in a user's browser by a website to remember information like login status, shopping cart contents, or user preferences.</p><table><tr><th>Cookie Type</th><th>Purpose</th></tr><tr><td>Session cookie</td><td>Temporary — keeps you logged in while browsing</td></tr><tr><td>Persistent cookie</td><td>Stays after browser closes — remembers preferences</td></tr><tr><td>Third-party cookie</td><td>Set by advertisers to track behavior across sites</td></tr></table><p><strong>Security threats from cookies:</strong><br>• <strong>Session hijacking</strong> — stealing session cookie to impersonate the user<br>• <strong>Cross-Site Scripting (XSS)</strong> — injecting scripts that steal cookies<br>• <strong>Cookie theft</strong> — intercepting cookies over unencrypted HTTP connections</p>`},
{id:'31',chapter:'ch2',years:'2024',tags:['security'],q:'What is SQL injection? How can it be prevented?',body:`<p><strong>SQL Injection</strong> is an attack where a hacker inserts malicious SQL code into an input field (like a login form) to manipulate the database.</p><p><strong>Example:</strong> Entering <code>' OR '1'='1</code> in a password field might trick the database into logging in without a real password.</p><table><tr><th>Prevention Method</th><th>How it helps</th></tr><tr><td><strong>Parameterized queries</strong></td><td>Separates SQL code from user input — most effective defense</td></tr><tr><td><strong>Input validation</strong></td><td>Rejects suspicious characters in form inputs</td></tr><tr><td><strong>Web Application Firewall</strong></td><td>Detects and blocks SQL injection patterns</td></tr><tr><td><strong>Least privilege</strong></td><td>Database user only has access to what is needed</td></tr><tr><td><strong>Error handling</strong></td><td>Don't show database error messages to users</td></tr></table>`},
{id:'32',chapter:'ch2',years:'2023',tags:['security','definition'],q:'What is a denial of service (DoS) attack? What is DDoS?',body:`<p>A <strong>DoS (Denial of Service) attack</strong> overwhelms a server with so much traffic or requests that it becomes unavailable to real users.</p><p>A <strong>DDoS (Distributed DoS)</strong> attack does the same but uses thousands of compromised devices (a botnet) to amplify the attack — making it much harder to stop.</p><table><tr><th>Feature</th><th>DoS</th><th>DDoS</th></tr><tr><td>Source</td><td>Single machine</td><td>Thousands of infected machines</td></tr><tr><td>Power</td><td>Limited</td><td>Massive — can bring down large websites</td></tr><tr><td>Difficulty to stop</td><td>Easy — block one IP</td><td>Hard — thousands of IPs</td></tr></table><p><strong>Impact on e-commerce:</strong> Website goes offline, losing sales and customer trust.</p>`},
{id:'33',chapter:'ch2',years:'2022',tags:['security'],q:'What is two-factor authentication (2FA)?',body:`<p><strong>2FA (Two-Factor Authentication)</strong> requires users to verify their identity using two separate factors before access is granted.</p><table><tr><th>Factor Type</th><th>Example</th></tr><tr><td><strong>Something you know</strong></td><td>Password, PIN</td></tr><tr><td><strong>Something you have</strong></td><td>OTP on phone, hardware token</td></tr><tr><td><strong>Something you are</strong></td><td>Fingerprint, face recognition</td></tr></table><p>2FA requires <strong>at least two</strong> of these factors. For example: password (know) + SMS code (have).</p><p><strong>Why it matters:</strong> Even if a password is stolen, attackers cannot log in without the second factor.</p>`},
{id:'34',chapter:'ch2',years:'2024',tags:['security','definition'],q:'What is RSA encryption? What are security threats in e-commerce?',body:`<p><strong>RSA (Rivest–Shamir–Adleman)</strong> is an asymmetric encryption algorithm widely used for secure data transmission.</p><table><tr><th>Step</th><th>Description</th></tr><tr><td>Key Generation</td><td>Two mathematically linked keys are created: a <strong>public key</strong> (shared openly) and a <strong>private key</strong> (kept secret)</td></tr><tr><td>Encryption</td><td>The sender uses the recipient's <strong>public key</strong> to encrypt the message</td></tr><tr><td>Decryption</td><td>Only the recipient's <strong>private key</strong> can decrypt the message</td></tr></table><p>RSA is used in HTTPS, email security, and digital signatures.</p><p><strong>Security Threats in E-Commerce:</strong></p><table><tr><th>Threat</th><th>Description</th></tr><tr><td><strong>Hacking</strong></td><td>Unauthorized access to the website or database to steal data</td></tr><tr><td><strong>Phishing</strong></td><td>Fake websites or emails trick users into revealing passwords or card details</td></tr><tr><td><strong>Malware</strong></td><td>Malicious software installed on a user's device to steal information</td></tr><tr><td><strong>Data theft</strong></td><td>Interception of customer data during transmission</td></tr><tr><td><strong>Identity theft</strong></td><td>Fraudsters steal personal information to make purchases or open accounts</td></tr></table>`},
{id:'35',chapter:'ch2',years:'2024',tags:['security'],q:'What technologies are used for e-commerce security? What are the challenges of web security?',body:`<p><strong>Technologies for E-Commerce Security:</strong></p><table><tr><th>Technology</th><th>Purpose</th></tr><tr><td><strong>SSL/TLS</strong></td><td>Encrypts data between the browser and the server (the "HTTPS" padlock)</td></tr><tr><td><strong>Encryption</strong></td><td>Converts sensitive data (like card numbers) into unreadable cipher text</td></tr><tr><td><strong>Firewalls</strong></td><td>Filter malicious traffic and block unauthorized access attempts</td></tr><tr><td><strong>Digital Signatures</strong></td><td>Verify the authenticity of transactions and communications</td></tr><tr><td><strong>Authentication Systems</strong></td><td>Two-factor authentication (2FA) and CAPTCHA prevent unauthorized logins</td></tr></table><p><strong>Challenges of Web Security:</strong></p><table><tr><th>Challenge</th><th>Explanation</th></tr><tr><td><strong>Increasing cyber attacks</strong></td><td>Attacks are growing in volume and sophistication every year</td></tr><tr><td><strong>Weak passwords</strong></td><td>Users often choose easy passwords that are simple for hackers to guess</td></tr><tr><td><strong>Lack of awareness</strong></td><td>Many users and small businesses do not know how to protect themselves</td></tr><tr><td><strong>System vulnerabilities</strong></td><td>Outdated software and unpatched systems are easy targets for attackers</td></tr></table>`},
];

render();

/* ═══════════════════════════════════════════
   AI ASSISTANT
═══════════════════════════════════════════ */
let aiMessages = []; // {role, content, id}
let aiTyping = false;
let aiMsgCounter = 0;

function toggleAI() {
  const panel = document.getElementById('ai-panel');
  const isOpen = panel.classList.toggle('open');
  if (isOpen && aiMessages.length === 0) {
    // Greet the user
    const name = currentUser || 'there';
    appendAIMsg('assistant', `Hey ${name}! 👋 I'm **Buddy**, your AI study assistant.\n\nI can help you:\n- 📝 **Create notes** on any topic\n- 🧠 **Explain** concepts clearly\n- 📋 **Summarize** topics for quick revision\n- 💡 **Generate** study plans or flashcards\n\nJust tell me what you'd like to learn or note down!`);
  }
}

function appendAIMsg(role, content, id) {
  const msgId = id || ('msg_' + (++aiMsgCounter));
  aiMessages.push({role, content, id: msgId});
  renderAIMessages();
  return msgId;
}

function renderAIMessages() {
  const container = document.getElementById('ai-messages');
  container.innerHTML = aiMessages.map(m => {
    const isUser = m.role === 'user';
    const html = parseMarkdownLight(m.content);
    return `<div class="ai-msg ${isUser ? 'ai-msg-user' : 'ai-msg-assistant'}" id="${m.id}">
      ${!isUser ? '<div class="ai-avatar">✦</div>' : ''}
      <div class="ai-bubble">${html}${
        (!isUser && m.noteContent) ? `<button class="ai-save-note-btn" onclick="saveAINote('${m.id}')">📥 Save as Note</button>` : ''
      }</div>
    </div>`;
  }).join('');
  // Show typing indicator if needed
  if (aiTyping) {
    container.innerHTML += `<div class="ai-msg ai-msg-assistant" id="ai-typing-indicator">
      <div class="ai-avatar">✦</div>
      <div class="ai-bubble"><div class="ai-typing-dots"><span></span><span></span><span></span></div></div>
    </div>`;
  }
  container.scrollTop = container.scrollHeight;
}

function parseMarkdownLight(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code>$1</code>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g, s => '<ul>' + s + '</ul>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>')
    .replace(/^(?!<[hul]|<\/[hul]|<p|<\/p)(.+)$/gm, (m, p) => p ? p : '');
}

async function sendAIMessage() {
  const input = document.getElementById('ai-input');
  const text = input.value.trim();
  if (!text || aiTyping) return;
  input.value = '';
  input.style.height = 'auto';

  appendAIMsg('user', text);
  aiTyping = true;
  renderAIMessages();

  try {
    // Build message history for context (last 10 messages)
    const history = aiMessages.slice(-10).map(m => ({
      role: m.role,
      content: m.content
    }));

    const systemPrompt = `You are Buddy, a friendly and smart AI study assistant embedded in a Study Buddy app. Your job is to help students create notes, understand topics, summarize content, and prepare for exams.

When creating notes or explaining topics:
- Be clear, structured and educational
- Use bullet points, numbered lists and headers where helpful
- Keep a warm, encouraging tone
- If the user asks to "create a note", "make a note", "write notes about", or similar — always end your response with a special marker: [SAVE_NOTE: <note title>] on its own line, followed by [NOTE_CONTENT_START] then the note content in clean HTML (using <p>, <strong>, <ul>, <li>, <h2>, <h3>, <table> tags) then [NOTE_CONTENT_END]
- If the user mentions a subject, use it. Otherwise pick a sensible subject.
- Be concise but thorough`;

    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: systemPrompt,
        messages: history
      })
    });

    const data = await response.json();
    const raw = data.content?.map(b => b.text || '').join('') || 'Sorry, I had trouble responding. Please try again.';

    aiTyping = false;

    // Parse for note content
    const noteMatch = raw.match(/\[SAVE_NOTE:\s*(.+?)\]\s*\[NOTE_CONTENT_START\]([\s\S]*?)\[NOTE_CONTENT_END\]/);
    let displayText = raw
      .replace(/\[SAVE_NOTE:.*?\]/g, '')
      .replace(/\[NOTE_CONTENT_START\][\s\S]*?\[NOTE_CONTENT_END\]/g, '')
      .trim();

    const msgId = 'msg_' + (++aiMsgCounter);
    const msgObj = { role: 'assistant', content: displayText, id: msgId };
    if (noteMatch) {
      msgObj.noteTitle = noteMatch[1].trim();
      msgObj.noteContent = noteMatch[2].trim();
      msgObj.noteSubject = extractSubjectFromConversation();
    }
    aiMessages.push(msgObj);
    renderAIMessages();

    // Re-render with save button if note
    if (noteMatch) renderAIMessages();

  } catch(err) {
    aiTyping = false;
    appendAIMsg('assistant', '⚠️ Connection error. Please check your internet and try again.');
  }
}

function extractSubjectFromConversation() {
  // Try to find a subject mentioned in recent messages
  const recent = aiMessages.slice(-4).map(m => m.content).join(' ');
  const data = getUserData(currentUser);
  for (const sub of data.subjects || []) {
    if (recent.toLowerCase().includes(sub.toLowerCase())) return sub;
  }
  return '';
}

function saveAINote(msgId) {
  const msg = aiMessages.find(m => m.id === msgId);
  if (!msg || !msg.noteContent) return;

  const data = getUserData(currentUser);
  const subject = msg.noteSubject || prompt('Which subject? (leave blank for none)', '') || '';

  const note = {
    id: 'n' + Date.now(),
    title: msg.noteTitle || 'AI Note',
    subject,
    text: msg.noteContent,
    drawing: null,
    hasDrawing: false,
    createdAt: Date.now(),
    updatedAt: Date.now()
  };
  if (!data.notes) data.notes = [];
  data.notes.unshift(note);
  if (subject && !data.subjects.includes(subject)) data.subjects.push(subject);
  saveUserData(currentUser, data);
  renderSubjectNav();

  // Update button
  const btn = document.querySelector(`#${msgId} .ai-save-note-btn`);
  if (btn) { btn.textContent = '✅ Saved!'; btn.disabled = true; btn.style.opacity = '0.6'; }
  showToast(`✓ Note "${note.title}" saved!`);
}

function clearAIChat() {
  aiMessages = [];
  renderAIMessages();
  // Re-greet
  const name = currentUser || 'there';
  appendAIMsg('assistant', `Hey ${name}! 👋 Chat cleared. I'm ready to help again!\n\nWhat would you like to study or note down?`);
}

function quickPrompt(text) {
  document.getElementById('ai-input').value = text;
  sendAIMessage();
}

// Auto-resize textarea
document.getElementById('ai-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
document.getElementById('ai-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendAIMessage(); }
});
</script>
