<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Buddy</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #08080f;
  --surface:  #111118;
  --surface2: #18181f;
  --surface3: #202028;
  --border:   rgba(255,255,255,0.06);
  --border2:  rgba(255,255,255,0.11);
  --border3:  rgba(255,255,255,0.18);
  --accent:   #7c6dfa;
  --accent2:  #00cba9;
  --accent3:  #ff6b6b;
  --accent4:  #ffd166;
  --text:     #eeeef8;
  --text2:    #c4c4dc;
  --muted:    #7878a0;
  --r:        14px;
  --r-sm:     9px;
  --ease:     cubic-bezier(.4,0,.2,1);
  --shadow:   0 8px 32px rgba(0,0,0,0.45);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 16px;
  line-height: 1.7;
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed; top: -300px; left: 50%;
  transform: translateX(-50%);
  width: min(900px,100vw); height: 600px;
  background: radial-gradient(ellipse, rgba(124,109,250,0.08) 0%, transparent 68%);
  pointer-events: none; z-index: 0;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border3); border-radius: 4px; }

/* ════════ LOGIN SCREEN ════════ */
#login-screen {
  position: fixed; inset: 0; z-index: 9000;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg);
  padding: 20px;
}
#login-screen::before {
  content: '';
  position: absolute; top: -200px; left: 50%;
  transform: translateX(-50%);
  width: 700px; height: 500px;
  background: radial-gradient(ellipse, rgba(124,109,250,0.14) 0%, transparent 68%);
  pointer-events: none;
}
.login-box {
  width: 100%; max-width: 420px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 40px 36px;
  box-shadow: 0 24px 80px rgba(0,0,0,0.5);
  position: relative; z-index: 1;
  animation: fadeUp .45s var(--ease) both;
}
@keyframes fadeUp {
  from { opacity:0; transform: translateY(20px); }
  to   { opacity:1; transform: translateY(0); }
}
.login-logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800; font-size: 1.5rem;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 6px;
}
.login-tagline { color: var(--muted); font-size: 14px; margin-bottom: 30px; }
.login-tabs {
  display: flex; gap: 6px; margin-bottom: 24px;
  background: var(--surface2); padding: 4px; border-radius: 10px;
}
.ltab {
  flex: 1; padding: 9px; border: none; border-radius: 7px;
  background: transparent; color: var(--muted);
  font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
  cursor: pointer; transition: all .22s var(--ease);
}
.ltab.active { background: var(--surface3); color: var(--text); }
.form-group { margin-bottom: 14px; }
.form-group label { font-size: 13px; color: var(--muted); display: block; margin-bottom: 6px; }
.form-group input {
  width: 100%;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 9px; padding: 11px 14px;
  color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px;
  outline: none; transition: border-color .22s var(--ease), box-shadow .22s var(--ease);
}
.form-group input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(124,109,250,0.15);
}
.btn-primary {
  width: 100%; padding: 12px;
  background: linear-gradient(135deg, var(--accent), #5a4fd8);
  border: none; border-radius: 10px; color: #fff;
  font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700;
  cursor: pointer; margin-top: 6px;
  transition: opacity .2s, transform .15s;
}
.btn-primary:hover { opacity: 0.9; }
.btn-primary:active { transform: scale(0.98); }
.login-error { color: var(--accent3); font-size: 13px; margin-top: 8px; display: none; }

/* ════════ MAIN APP (hidden until login) ════════ */
#app { display: none; }

/* ── HEADER ── */
.site-header {
  position: sticky; top: 0; z-index: 200;
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  background: rgba(8,8,15,0.9);
  border-bottom: 1px solid var(--border2);
}
.header-inner {
  max-width: 1100px; margin: 0 auto;
  display: flex; align-items: center; gap: 14px;
  padding: 12px 20px;
}
.logo {
  font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1rem;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; white-space: nowrap; flex-shrink: 0;
}
.header-spacer { flex: 1; }
.user-chip {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 30px; padding: 7px 14px 7px 10px;
  font-size: 13px; font-weight: 500; cursor: pointer;
  transition: border-color .2s;
}
.user-chip:hover { border-color: var(--border3); }
.user-avatar {
  width: 26px; height: 26px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0;
}

/* ── SUBJECT NAVBAR ── */
.subject-nav-wrap {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 57px; z-index: 190;
}
.subject-nav {
  max-width: 1100px; margin: 0 auto;
  display: flex; align-items: center; gap: 4px;
  padding: 8px 16px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.subject-nav::-webkit-scrollbar { display: none; }
.snav-btn {
  font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
  padding: 7px 16px; border-radius: 8px;
  border: 1px solid var(--border2); background: transparent;
  color: var(--muted); cursor: pointer; white-space: nowrap;
  transition: all .2s var(--ease);
  -webkit-tap-highlight-color: transparent;
  flex-shrink: 0;
}
.snav-btn:hover { border-color: var(--border3); color: var(--text2); }
.snav-btn.active { background: rgba(124,109,250,0.15); border-color: var(--accent); color: var(--accent); }
.snav-btn.notes-tab { border-color: var(--accent2); color: var(--accent2); }
.snav-btn.notes-tab.active { background: rgba(0,203,169,0.15); }
.snav-add {
  width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0;
  background: var(--surface2); border: 1px solid var(--border2);
  color: var(--muted); font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s;
}
.snav-add:hover { border-color: var(--accent); color: var(--accent); }

/* ── VIEWS ── */
.view { display: none; }
.view.active { display: block; }

/* ── Q&A VIEW ── */
.hero {
  max-width: 1100px; margin: 0 auto;
  padding: 1.75rem 20px 1.25rem;
  position: relative; z-index: 1;
}
.hero h1 {
  font-family: 'Syne', sans-serif;
  font-size: clamp(1.5rem, 5vw, 2.8rem); font-weight: 800; letter-spacing: -0.04em; line-height: 1.1;
  margin-bottom: 0.5rem;
}
.hero h1 span { background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.hero p { color: var(--muted); font-size: 0.95rem; }

/* search */
.search-wrap { max-width: 1100px; margin: 0 auto; padding: 0 20px 14px; position: relative; z-index:1; }
.search-wrap-inner { position: relative; }
.search-wrap-inner svg { position: absolute; left:12px; top:50%; transform:translateY(-50%); opacity:.35; pointer-events:none; }
#search { width:100%; background:var(--surface2); border:1px solid var(--border2); border-radius:var(--r-sm); padding:10px 14px 10px 38px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:15px; outline:none; transition:border-color .25s,box-shadow .25s; }
#search:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(124,109,250,0.15); }
#search::placeholder { color:var(--muted); }

main { max-width:1100px; margin:0 auto; padding:0 20px 5rem; position:relative; z-index:1; }
#result-info { font-size:13px; color:var(--muted); margin-bottom:1rem; }
.qa-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); margin-bottom:10px; overflow:hidden; transition:border-color .25s,box-shadow .25s; }
.qa-card:hover { border-color:var(--border3); box-shadow:0 6px 28px rgba(0,0,0,0.35); }
.qa-card.open { border-color:rgba(124,109,250,0.38); box-shadow:0 6px 32px rgba(124,109,250,0.12); }
.qa-header { display:flex; align-items:flex-start; gap:14px; padding:15px 18px; cursor:pointer; user-select:none; -webkit-tap-highlight-color:transparent; }
.q-badge { flex-shrink:0; min-width:42px; height:42px; border-radius:9px; background:var(--surface2); border:1px solid var(--border2); display:flex; align-items:center; justify-content:center; font-family:'Syne',sans-serif; font-weight:700; font-size:11px; color:var(--muted); transition:all .25s; }
.qa-card.open .q-badge { background:rgba(124,109,250,0.18); border-color:rgba(124,109,250,0.45); color:var(--accent); }
.q-info { flex:1; min-width:0; }
.q-info h3 { font-family:'Syne',sans-serif; font-weight:600; font-size:1rem; line-height:1.45; margin-bottom:6px; word-break:break-word; }
.q-meta { display:flex; gap:5px; flex-wrap:wrap; align-items:center; }
.year-tag { font-size:11px; color:var(--muted); background:var(--surface2); border:1px solid var(--border2); border-radius:5px; padding:2px 7px; }
.cat-tag { font-size:11px; border-radius:5px; padding:2px 7px; font-weight:600; }
.cat-tag.definition { background:rgba(0,203,169,0.12); color:var(--accent2); }
.cat-tag.models { background:rgba(124,109,250,0.12); color:#b0a8ff; }
.cat-tag.security { background:rgba(255,107,107,0.12); color:var(--accent3); }
.cat-tag.marketing { background:rgba(255,209,102,0.12); color:var(--accent4); }
.cat-tag.governance { background:rgba(129,236,236,0.12); color:#81ecec; }
.q-chevron { flex-shrink:0; font-size:16px; color:var(--muted); margin-top:6px; transition:transform .3s var(--ease),color .2s; }
.qa-card.open .q-chevron { transform:rotate(180deg); color:var(--accent); }
.qa-body { overflow:hidden; max-height:0; transition:max-height .45s var(--ease),opacity .35s; opacity:0; border-top:1px solid transparent; }
.qa-card.open .qa-body { max-height:9999px; opacity:1; border-top-color:var(--border); }
.qa-body-inner { padding:4px 18px 18px; }
.qa-body p { color:var(--text2); font-size:1rem; line-height:1.8; margin:0.9rem 0 0.4rem; word-break:break-word; }
.qa-body p strong { color:var(--text); font-weight:600; }
.table-scroll { width:100%; overflow-x:auto; -webkit-overflow-scrolling:touch; margin:0.8rem 0 0.4rem; border-radius:var(--r-sm); border:1px solid var(--border2); }
.qa-body table { width:100%; min-width:300px; border-collapse:collapse; font-size:0.95rem; }
.qa-body th { text-align:left; padding:10px 14px; background:var(--surface2); color:var(--muted); font-weight:600; font-size:0.82rem; letter-spacing:.04em; text-transform:uppercase; border-bottom:1px solid var(--border2); white-space:nowrap; }
.qa-body td { padding:10px 14px; border-bottom:1px solid var(--border); color:var(--text2); vertical-align:top; font-size:0.95rem; line-height:1.6; }
.qa-body tr:last-child td { border-bottom:none; }
.qa-body td strong { color:var(--text); }
.qa-body tr:nth-child(even) td { background:rgba(255,255,255,0.012); }
.diagram-wrap { margin:0.8rem 0; background:var(--surface2); border:1px solid var(--border2); border-radius:var(--r); padding:16px; overflow-x:auto; }
mark { background:rgba(255,209,102,0.25); color:inherit; border-radius:3px; padding:1px 2px; }
.no-results { text-align:center; padding:4rem 1rem; color:var(--muted); }
.chapter-divider { display:flex; align-items:center; gap:14px; margin:1.8rem 0 0.8rem; }
.chapter-divider-line { flex:1; height:1px; background:var(--border2); }
.chapter-divider-label { font-family:'Syne',sans-serif; font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; padding:4px 14px; border-radius:20px; white-space:nowrap; }
.chapter-divider.ch1 .chapter-divider-label { background:rgba(124,109,250,0.13); border:1px solid rgba(124,109,250,0.3); color:#b0a8ff; }
.chapter-divider.ch2 .chapter-divider-label { background:rgba(255,107,107,0.1); border:1px solid rgba(255,107,107,0.3); color:#ff9494; }

/* ── FILTER BAR ── */
.filter-bar { max-width:1100px; margin:0 auto; padding:0 20px 10px; display:flex; gap:6px; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
.filter-bar::-webkit-scrollbar { display:none; }
.fbtn { font-family:'DM Sans',sans-serif; font-size:12px; font-weight:500; padding:5px 14px; border:1px solid var(--border2); border-radius:20px; background:transparent; color:var(--muted); cursor:pointer; transition:all .2s; white-space:nowrap; flex-shrink:0; }
.fbtn.active { background:var(--accent); border-color:var(--accent); color:#fff; }

/* ════════ NOTES VIEW ════════ */
#notes-view { max-width: 1100px; margin: 0 auto; padding: 20px 20px 5rem; }
.notes-header { display:flex; align-items:center; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
.notes-header h2 { font-family:'Syne',sans-serif; font-weight:700; font-size:1.3rem; flex:1; }
.btn-new-note {
  display:flex; align-items:center; gap:7px;
  background: linear-gradient(135deg, var(--accent), #5a4fd8);
  border:none; border-radius:9px; color:#fff;
  font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600;
  padding:9px 18px; cursor:pointer; transition:opacity .2s, transform .15s;
}
.btn-new-note:hover { opacity:.9; }
.btn-new-note:active { transform:scale(0.97); }
.notes-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap:14px; }
.note-card {
  background:var(--surface); border:1px solid var(--border2);
  border-radius:var(--r); padding:18px; cursor:pointer;
  transition: border-color .2s, box-shadow .2s, transform .15s;
  position: relative; overflow: hidden;
}
.note-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; }
.note-card.clr-0::before { background: linear-gradient(90deg,var(--accent),var(--accent2)); }
.note-card.clr-1::before { background: linear-gradient(90deg,var(--accent3),var(--accent4)); }
.note-card.clr-2::before { background: linear-gradient(90deg,var(--accent2),#00a8ff); }
.note-card.clr-3::before { background: linear-gradient(90deg,var(--accent4),var(--accent)); }
.note-card:hover { border-color:var(--border3); box-shadow:0 6px 24px rgba(0,0,0,0.35); transform:translateY(-2px); }
.note-card-title { font-family:'Syne',sans-serif; font-weight:700; font-size:0.95rem; margin-bottom:7px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.note-card-preview { font-size:13px; color:var(--muted); line-height:1.55; max-height:52px; overflow:hidden; margin-bottom:12px; }
.note-card-meta { display:flex; align-items:center; justify-content:space-between; }
.note-card-date { font-size:11px; color:var(--muted); }
.note-card-subject { font-size:11px; color:var(--accent2); background:rgba(0,203,169,0.1); border:1px solid rgba(0,203,169,0.2); padding:2px 8px; border-radius:5px; }
.note-card-del { background:none; border:none; color:var(--muted); font-size:16px; cursor:pointer; padding:2px 5px; border-radius:5px; opacity:0; transition:opacity .15s, color .15s; }
.note-card:hover .note-card-del { opacity:1; }
.note-card-del:hover { color:var(--accent3); }
.notes-empty { text-align:center; padding:4rem 1rem; color:var(--muted); grid-column:1/-1; }
.notes-empty svg { margin-bottom:12px; opacity:.2; }

/* ════════ NOTE EDITOR MODAL ════════ */
#note-modal {
  position:fixed; inset:0; z-index:8000;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px);
  display:flex; align-items:flex-start; justify-content:center;
  padding:20px; overflow-y:auto;
  opacity:0; pointer-events:none; transition: opacity .3s;
}
#note-modal.open { opacity:1; pointer-events:all; }
.note-editor-box {
  width:100%; max-width:820px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 32px 80px rgba(0,0,0,0.6);
  transform: translateY(20px); transition: transform .35s var(--ease);
  margin: auto;
}
#note-modal.open .note-editor-box { transform: translateY(0); }

.editor-header {
  display:flex; align-items:center; gap:12px;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
}
.editor-title-input {
  flex:1; background:transparent; border:none; outline:none;
  font-family:'Syne',sans-serif; font-weight:700; font-size:1.1rem; color:var(--text);
}
.editor-title-input::placeholder { color:var(--muted); }
.editor-subject-input {
  background:var(--surface3); border:1px solid var(--border2); border-radius:7px;
  padding:7px 12px; font-family:'DM Sans',sans-serif; font-size:13px; color:var(--text);
  outline:none; min-width:130px; transition: border-color .2s;
}
.editor-subject-input:focus { border-color: var(--accent2); }
.editor-close {
  background:none; border:none; color:var(--muted); font-size:22px; cursor:pointer;
  padding:0 4px; transition: color .2s; line-height:1;
}
.editor-close:hover { color:var(--text); }

/* Editor toolbar */
.editor-toolbar {
  display:flex; align-items:center; gap:4px; flex-wrap:wrap;
  padding:10px 16px;
  border-bottom:1px solid var(--border);
  background: var(--surface2);
}
.toolbar-group { display:flex; gap:2px; }
.toolbar-sep { width:1px; height:24px; background:var(--border2); margin:0 4px; align-self:center; }
.tbtn {
  background:none; border:none; color:var(--muted); font-size:13px; font-weight:600;
  padding:6px 8px; border-radius:6px; cursor:pointer; line-height:1;
  transition: all .15s; white-space:nowrap;
}
.tbtn:hover { background:var(--surface3); color:var(--text); }
.tbtn.active { background:rgba(124,109,250,0.15); color:var(--accent); }
.tbtn svg { width:15px; height:15px; display:block; }

/* Tab switcher */
.editor-tabs {
  display:flex; border-bottom:1px solid var(--border);
}
.etab {
  padding:10px 20px; background:none; border:none;
  font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500;
  color:var(--muted); cursor:pointer; border-bottom:2px solid transparent;
  transition: all .2s;
}
.etab.active { color:var(--accent); border-bottom-color:var(--accent); }

/* Rich text editor */
#rich-editor {
  min-height: 280px; max-height: 420px; overflow-y:auto;
  padding:18px 20px; outline:none;
  color:var(--text2); line-height:1.8; font-size:15px;
  caret-color: var(--accent);
}
#rich-editor:empty::before { content:attr(data-placeholder); color:var(--muted); pointer-events:none; }
#rich-editor h1,#rich-editor h2,#rich-editor h3 { font-family:'Syne',sans-serif; color:var(--text); margin:0.8em 0 0.3em; line-height:1.3; }
#rich-editor h1 { font-size:1.5rem; }
#rich-editor h2 { font-size:1.2rem; }
#rich-editor h3 { font-size:1rem; }
#rich-editor strong { color:var(--text); }
#rich-editor em { color:var(--text2); }
#rich-editor ul, #rich-editor ol { padding-left:1.5em; margin:0.5em 0; }
#rich-editor blockquote { border-left:3px solid var(--accent); margin:0.8em 0; padding-left:1em; color:var(--muted); }
#rich-editor table { border-collapse:collapse; width:100%; margin:0.8em 0; }
#rich-editor table td, #rich-editor table th { border:1px solid var(--border2); padding:8px 12px; min-width:80px; }
#rich-editor table th { background:var(--surface2); font-weight:600; font-size:0.85rem; }
#rich-editor a { color:var(--accent); }

/* Drawing canvas */
#draw-panel { display:none; flex-direction:column; }
#draw-panel.show { display:flex; }
.draw-toolbar {
  display:flex; align-items:center; gap:8px; flex-wrap:wrap;
  padding:10px 16px; border-bottom:1px solid var(--border);
  background:var(--surface2);
}
.draw-tool-btn {
  background:none; border:1px solid var(--border2); border-radius:7px;
  color:var(--muted); font-size:12px; font-weight:600;
  padding:6px 12px; cursor:pointer; transition:all .15s;
}
.draw-tool-btn.active { border-color:var(--accent); color:var(--accent); background:rgba(124,109,250,0.1); }
.draw-tool-btn:hover { border-color:var(--border3); color:var(--text); }
.color-picker-wrap { display:flex; align-items:center; gap:4px; }
.color-dot { width:22px; height:22px; border-radius:50%; border:2px solid transparent; cursor:pointer; transition:transform .15s, border-color .15s; }
.color-dot:hover { transform:scale(1.15); }
.color-dot.active { border-color:#fff; transform:scale(1.1); }
.size-slider { width:70px; accent-color:var(--accent); cursor:pointer; }
#draw-canvas { background:var(--surface2); display:block; touch-action:none; cursor:crosshair; }
.draw-actions { display:flex; gap:8px; padding:8px 16px; border-top:1px solid var(--border); }
.btn-sm { padding:7px 14px; border-radius:7px; border:1px solid var(--border2); background:transparent; color:var(--muted); font-family:'DM Sans',sans-serif; font-size:12px; font-weight:500; cursor:pointer; transition:all .15s; }
.btn-sm:hover { border-color:var(--border3); color:var(--text); }
.btn-sm.danger:hover { border-color:var(--accent3); color:var(--accent3); }

/* Table insert panel */
#table-panel { display:none; padding:16px 20px; border-bottom:1px solid var(--border); background:var(--surface2); }
#table-panel.show { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
#table-panel label { font-size:13px; color:var(--muted); }
.table-size-input { width:48px; background:var(--surface3); border:1px solid var(--border2); border-radius:6px; padding:6px 8px; color:var(--text); font-size:13px; outline:none; text-align:center; }
.btn-insert { background:var(--accent); border:none; border-radius:7px; color:#fff; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; padding:7px 16px; cursor:pointer; transition:opacity .2s; }
.btn-insert:hover { opacity:.85; }

/* Editor footer */
.editor-footer { display:flex; align-items:center; justify-content:flex-end; gap:10px; padding:14px 20px; border-top:1px solid var(--border); background:var(--surface2); }
.btn-cancel { background:none; border:1px solid var(--border2); border-radius:9px; color:var(--muted); font-family:'DM Sans',sans-serif; font-size:14px; padding:9px 20px; cursor:pointer; transition:all .2s; }
.btn-cancel:hover { border-color:var(--border3); color:var(--text); }
.btn-save { background:linear-gradient(135deg,var(--accent2),#00a8c0); border:none; border-radius:9px; color:#fff; font-family:'Syne',sans-serif; font-size:14px; font-weight:700; padding:9px 24px; cursor:pointer; transition:opacity .2s, transform .15s; }
.btn-save:hover { opacity:.9; }
.btn-save:active { transform:scale(0.97); }

/* ── NEW SUBJECT MODAL ── */
#subject-modal {
  position:fixed; inset:0; z-index:7000; background:rgba(0,0,0,0.65); backdrop-filter:blur(6px);
  display:flex; align-items:center; justify-content:center; padding:20px;
  opacity:0; pointer-events:none; transition:opacity .25s;
}
#subject-modal.open { opacity:1; pointer-events:all; }
.subject-modal-box { background:var(--surface); border:1px solid var(--border2); border-radius:16px; padding:28px; width:100%; max-width:380px; box-shadow:var(--shadow); transform:scale(0.96); transition:transform .25s var(--ease); }
#subject-modal.open .subject-modal-box { transform:scale(1); }
.subject-modal-box h3 { font-family:'Syne',sans-serif; font-weight:700; font-size:1.05rem; margin-bottom:16px; }
.subject-modal-box input { width:100%; background:var(--surface2); border:1px solid var(--border2); border-radius:9px; padding:11px 14px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:15px; outline:none; margin-bottom:14px; transition:border-color .2s; }
.subject-modal-box input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(124,109,250,0.12); }
.subject-modal-btns { display:flex; gap:8px; justify-content:flex-end; }

/* ── TOAST ── */
#toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(60px); background:var(--surface3); border:1px solid var(--border3); color:var(--text); font-size:13px; font-weight:500; padding:10px 20px; border-radius:30px; z-index:9999; transition:transform .35s var(--ease),opacity .35s; opacity:0; pointer-events:none; white-space:nowrap; box-shadow:var(--shadow); }
#toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

/* ── USER DROPDOWN ── */
#user-menu { position:fixed; z-index:5000; background:var(--surface); border:1px solid var(--border2); border-radius:12px; padding:8px; min-width:180px; box-shadow:var(--shadow); display:none; }
#user-menu.show { display:block; animation: fadeUp .18s var(--ease); }
.umenu-item { padding:9px 14px; border-radius:8px; font-size:13px; color:var(--muted); cursor:pointer; transition:all .15s; }
.umenu-item:hover { background:var(--surface2); color:var(--text); }
.umenu-item.danger:hover { color:var(--accent3); }
.umenu-sep { height:1px; background:var(--border); margin:4px 0; }

/* Responsive */
@media (max-width: 600px) {
  .login-box { padding: 28px 20px; }
  #rich-editor { min-height:200px; max-height:300px; }
  #draw-canvas { height:220px !important; }
}
</style>
</head>
<body>

<!-- ════════ LOGIN SCREEN ════════ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">📚 Study Buddy</div>
    <div class="login-tagline">Your personal study companion</div>
    <div class="login-tabs">
      <button class="ltab active" onclick="switchLoginTab('login',this)">Log In</button>
      <button class="ltab" onclick="switchLoginTab('signup',this)">Sign Up</button>
    </div>
    <div id="login-form">
      <div class="form-group"><label>Username</label><input type="text" id="login-user" placeholder="Enter your username" autocomplete="username"></div>
      <div class="form-group"><label>Password</label><input type="password" id="login-pass" placeholder="Enter your password" autocomplete="current-password"></div>
      <button class="btn-primary" onclick="doLogin()">Log In →</button>
      <div class="login-error" id="login-err"></div>
    </div>
    <div id="signup-form" style="display:none">
      <div class="form-group"><label>Username</label><input type="text" id="signup-user" placeholder="Choose a username" autocomplete="username"></div>
      <div class="form-group"><label>Password</label><input type="password" id="signup-pass" placeholder="Choose a password" autocomplete="new-password"></div>
      <div class="form-group"><label>Confirm Password</label><input type="password" id="signup-pass2" placeholder="Repeat password"></div>
      <button class="btn-primary" onclick="doSignup()">Create Account →</button>
      <div class="login-error" id="signup-err"></div>
    </div>
  </div>
</div>

<!-- ════════ MAIN APP ════════ -->
<div id="app">

  <!-- Header -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">📚 Study Buddy</div>
      <div class="header-spacer"></div>
      <div class="user-chip" onclick="toggleUserMenu(event)">
        <div class="user-avatar" id="user-avatar-letter">U</div>
        <span id="user-display-name">User</span>
        <span style="color:var(--muted);font-size:10px">▾</span>
      </div>
    </div>
  </header>

  <!-- Subject Navbar -->
  <nav class="subject-nav-wrap">
    <div class="subject-nav" id="subject-nav">
      <button class="snav-btn notes-tab" id="notes-tab-btn" onclick="showView('notes')">📝 My Notes</button>
      <button class="snav-btn active" id="qa-tab-btn" onclick="showView('qa')">📘 E-Commerce Q&A</button>
      <div style="width:1px;height:24px;background:var(--border2);margin:0 4px;align-self:center;flex-shrink:0"></div>
      <div id="subject-tabs"></div>
      <button class="snav-add" onclick="openSubjectModal()" title="Add subject">+</button>
    </div>
  </nav>

  <!-- ── Q&A VIEW ── -->
  <div id="qa-view" class="view active">
    <div class="hero">
      <h1>E-Commerce <span>Complete Q&A</span></h1>
      <p>35 questions · 2 chapters · Exam-ready notes</p>
    </div>
    <div class="search-wrap">
      <div class="search-wrap-inner">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="search" type="text" placeholder="Search questions, topics…" oninput="render()" autocomplete="off">
      </div>
    </div>
    <div class="filter-bar" id="filter-bar">
      <button class="fbtn active" onclick="setFilter('all',this)">All</button>
      <button class="fbtn" onclick="setFilter('definition',this)">Definition</button>
      <button class="fbtn" onclick="setFilter('models',this)">Models</button>
      <button class="fbtn" onclick="setFilter('security',this)">Security</button>
      <button class="fbtn" onclick="setFilter('marketing',this)">Marketing</button>
      <button class="fbtn" onclick="setFilter('governance',this)">Governance</button>
    </div>
    <main>
      <div id="result-info"></div>
      <div id="list"></div>
    </main>
  </div>

  <!-- ── NOTES VIEW ── -->
  <div id="notes-view" class="view">
    <div class="notes-header">
      <h2 id="notes-view-title">📝 My Notes</h2>
      <button class="btn-new-note" onclick="openNoteEditor()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        New Note
      </button>
    </div>
    <div class="notes-grid" id="notes-grid"></div>
  </div>

  <!-- ── SUBJECT NOTE VIEW ── -->
  <div id="subject-view" class="view">
    <div style="max-width:1100px;margin:0 auto;padding:20px 20px 5rem;">
      <div class="notes-header">
        <h2 id="subject-view-title">Subject Notes</h2>
        <button class="btn-new-note" onclick="openNoteEditorForSubject()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
          New Note
        </button>
      </div>
      <div class="notes-grid" id="subject-notes-grid"></div>
    </div>
  </div>

</div><!-- /app -->

<!-- ════════ NOTE EDITOR MODAL ════════ -->
<div id="note-modal">
  <div class="note-editor-box">
    <div class="editor-header">
      <input class="editor-title-input" id="note-title" type="text" placeholder="Note title…">
      <input class="editor-subject-input" id="note-subject" type="text" placeholder="Subject (e.g. Math)" list="subjects-datalist">
      <datalist id="subjects-datalist"></datalist>
      <button class="editor-close" onclick="closeNoteEditor()">×</button>
    </div>
    <div class="editor-tabs">
      <button class="etab active" onclick="switchEditorTab('text',this)">✏️ Text</button>
      <button class="etab" onclick="switchEditorTab('draw',this)">🎨 Drawing</button>
    </div>

    <!-- TEXT TAB -->
    <div id="text-panel">
      <div class="editor-toolbar">
        <div class="toolbar-group">
          <button class="tbtn" onclick="fmt('bold')" title="Bold"><b>B</b></button>
          <button class="tbtn" onclick="fmt('italic')" title="Italic"><i>I</i></button>
          <button class="tbtn" onclick="fmt('underline')" title="Underline"><u>U</u></button>
          <button class="tbtn" onclick="fmt('strikeThrough')" title="Strike">S̶</button>
        </div>
        <div class="toolbar-sep"></div>
        <div class="toolbar-group">
          <button class="tbtn" onclick="fmtBlock('h1')">H1</button>
          <button class="tbtn" onclick="fmtBlock('h2')">H2</button>
          <button class="tbtn" onclick="fmtBlock('h3')">H3</button>
          <button class="tbtn" onclick="fmtBlock('p')">¶</button>
        </div>
        <div class="toolbar-sep"></div>
        <div class="toolbar-group">
          <button class="tbtn" onclick="fmt('insertUnorderedList')">• List</button>
          <button class="tbtn" onclick="fmt('insertOrderedList')">1. List</button>
          <button class="tbtn" onclick="fmtBlock('blockquote')">❝</button>
        </div>
        <div class="toolbar-sep"></div>
        <button class="tbtn" onclick="toggleTablePanel()" id="table-toggle-btn">⊞ Table</button>
        <button class="tbtn" onclick="fmt('removeFormat')">✕ Clear</button>
      </div>
      <div id="table-panel">
        <label>Rows:</label>
        <input class="table-size-input" id="tbl-rows" type="number" value="3" min="1" max="20">
        <label>Cols:</label>
        <input class="table-size-input" id="tbl-cols" type="number" value="3" min="1" max="10">
        <button class="btn-insert" onclick="insertTable()">Insert Table</button>
        <button class="tbtn" onclick="toggleTablePanel()">Cancel</button>
      </div>
      <div id="rich-editor" contenteditable="true" data-placeholder="Start writing your note…" spellcheck="true"></div>
    </div>

    <!-- DRAW TAB -->
    <div id="draw-panel">
      <div class="draw-toolbar">
        <button class="draw-tool-btn active" id="tool-pen" onclick="setDrawTool('pen',this)">✏️ Pen</button>
        <button class="draw-tool-btn" id="tool-line" onclick="setDrawTool('line',this)">╲ Line</button>
        <button class="draw-tool-btn" id="tool-rect" onclick="setDrawTool('rect',this)">▭ Rect</button>
        <button class="draw-tool-btn" id="tool-circle" onclick="setDrawTool('circle',this)">◯ Circle</button>
        <button class="draw-tool-btn" id="tool-text" onclick="setDrawTool('text',this)">T Text</button>
        <button class="draw-tool-btn" id="tool-eraser" onclick="setDrawTool('eraser',this)">⌫ Eraser</button>
        <div class="toolbar-sep"></div>
        <div class="color-picker-wrap" id="color-picker">
          <div class="color-dot active" style="background:#eeeef8" data-color="#eeeef8" onclick="setColor(this)"></div>
          <div class="color-dot" style="background:#7c6dfa" data-color="#7c6dfa" onclick="setColor(this)"></div>
          <div class="color-dot" style="background:#00cba9" data-color="#00cba9" onclick="setColor(this)"></div>
          <div class="color-dot" style="background:#ff6b6b" data-color="#ff6b6b" onclick="setColor(this)"></div>
          <div class="color-dot" style="background:#ffd166" data-color="#ffd166" onclick="setColor(this)"></div>
          <div class="color-dot" style="background:#74b9ff" data-color="#74b9ff" onclick="setColor(this)"></div>
        </div>
        <div class="toolbar-sep"></div>
        <label style="font-size:12px;color:var(--muted)">Size:</label>
        <input class="size-slider" type="range" id="brush-size" min="1" max="20" value="3">
      </div>
      <canvas id="draw-canvas" width="780" height="340"></canvas>
      <div class="draw-actions">
        <button class="btn-sm danger" onclick="clearCanvas()">🗑 Clear Canvas</button>
        <button class="btn-sm" onclick="undoDraw()">↩ Undo</button>
      </div>
    </div>

    <div class="editor-footer">
      <button class="btn-cancel" onclick="closeNoteEditor()">Cancel</button>
      <button class="btn-save" onclick="saveNote()">Save Note ✓</button>
    </div>
  </div>
</div>

<!-- ════════ ADD SUBJECT MODAL ════════ -->
<div id="subject-modal">
  <div class="subject-modal-box">
    <h3>Add New Subject</h3>
    <input type="text" id="new-subject-input" placeholder="e.g. Mathematics, Physics…" onkeydown="if(event.key==='Enter')addSubject()">
    <div class="subject-modal-btns">
      <button class="btn-cancel" onclick="closeSubjectModal()">Cancel</button>
      <button class="btn-insert" onclick="addSubject()">Add Subject</button>
    </div>
  </div>
</div>

<!-- User dropdown -->
<div id="user-menu">
  <div class="umenu-item" id="umenu-name" style="color:var(--text);font-weight:600;cursor:default"></div>
  <div class="umenu-sep"></div>
  <div class="umenu-item danger" onclick="doLogout()">🚪 Log Out</div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
/* ═══════════════════════════════════════════
   STORAGE HELPERS
═══════════════════════════════════════════ */
function getUsers() { return JSON.parse(localStorage.getItem('sb_users') || '{}'); }
function saveUsers(u) { localStorage.setItem('sb_users', JSON.stringify(u)); }
function getCurrentUser() { return localStorage.getItem('sb_current_user'); }
function setCurrentUser(u) { localStorage.setItem('sb_current_user', u); }
function getUserData(user) { return JSON.parse(localStorage.getItem('sb_data_' + user) || '{"notes":[],"subjects":[]}'); }
function saveUserData(user, data) { localStorage.setItem('sb_data_' + user, JSON.stringify(data)); }

/* ═══════════════════════════════════════════
   LOGIN / SIGNUP
═══════════════════════════════════════════ */
let currentUser = null;

function switchLoginTab(tab, btn) {
  document.querySelectorAll('.ltab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('login-form').style.display = tab === 'login' ? '' : 'none';
  document.getElementById('signup-form').style.display = tab === 'signup' ? '' : 'none';
}

function doLogin() {
  const user = document.getElementById('login-user').value.trim();
  const pass = document.getElementById('login-pass').value;
  const err = document.getElementById('login-err');
  if (!user || !pass) { showLoginErr(err, 'Please fill in all fields.'); return; }
  const users = getUsers();
  if (!users[user] || users[user] !== btoa(pass)) { showLoginErr(err, 'Invalid username or password.'); return; }
  loginSuccess(user);
}

function doSignup() {
  const user = document.getElementById('signup-user').value.trim();
  const pass = document.getElementById('signup-pass').value;
  const pass2 = document.getElementById('signup-pass2').value;
  const err = document.getElementById('signup-err');
  if (!user || !pass) { showLoginErr(err, 'Please fill in all fields.'); return; }
  if (pass.length < 4) { showLoginErr(err, 'Password must be at least 4 characters.'); return; }
  if (pass !== pass2) { showLoginErr(err, 'Passwords do not match.'); return; }
  const users = getUsers();
  if (users[user]) { showLoginErr(err, 'Username already taken.'); return; }
  users[user] = btoa(pass);
  saveUsers(users);
  loginSuccess(user);
}

function showLoginErr(el, msg) {
  el.textContent = msg; el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 3000);
}

function loginSuccess(user) {
  currentUser = user;
  setCurrentUser(user);
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('user-display-name').textContent = user;
  document.getElementById('user-avatar-letter').textContent = user[0].toUpperCase();
  document.getElementById('umenu-name').textContent = user;
  initApp();
}

function doLogout() {
  currentUser = null;
  localStorage.removeItem('sb_current_user');
  location.reload();
}

function toggleUserMenu(e) {
  e.stopPropagation();
  const m = document.getElementById('user-menu');
  const chip = e.currentTarget.getBoundingClientRect();
  m.style.top = (chip.bottom + 8) + 'px';
  m.style.right = (window.innerWidth - chip.right) + 'px';
  m.classList.toggle('show');
}
document.addEventListener('click', () => document.getElementById('user-menu').classList.remove('show'));

/* ═══════════════════════════════════════════
   APP INIT
═══════════════════════════════════════════ */
function initApp() {
  renderSubjectNav();
  renderNotesGrid();
  render();
  // Auto-login check
}

// Check existing session
(function() {
  const u = getCurrentUser();
  if (u && getUsers()[u]) {
    currentUser = u;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('user-display-name').textContent = u;
    document.getElementById('user-avatar-letter').textContent = u[0].toUpperCase();
    document.getElementById('umenu-name').textContent = u;
    initApp();
  }
})();

/* ═══════════════════════════════════════════
   VIEWS
═══════════════════════════════════════════ */
let currentView = 'qa';
let currentSubjectView = null;

function showView(view, subjectName) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.snav-btn').forEach(b => b.classList.remove('active'));

  if (view === 'qa') {
    document.getElementById('qa-view').classList.add('active');
    document.getElementById('qa-tab-btn').classList.add('active');
    currentView = 'qa';
  } else if (view === 'notes') {
    document.getElementById('notes-view').classList.add('active');
    document.getElementById('notes-tab-btn').classList.add('active');
    document.getElementById('notes-view-title').textContent = '📝 All My Notes';
    renderNotesGrid(null, 'notes-grid');
    currentView = 'notes';
  } else if (view === 'subject') {
    document.getElementById('subject-view').classList.add('active');
    currentSubjectView = subjectName;
    document.getElementById('subject-view-title').textContent = '📂 ' + subjectName;
    renderNotesGrid(subjectName, 'subject-notes-grid');
    // Highlight subject tab
    document.querySelectorAll('.snav-btn[data-subject]').forEach(b => {
      if (b.dataset.subject === subjectName) b.classList.add('active');
    });
    currentView = 'subject';
  }
}

/* ═══════════════════════════════════════════
   SUBJECT NAV
═══════════════════════════════════════════ */
function renderSubjectNav() {
  const data = getUserData(currentUser);
  const container = document.getElementById('subject-tabs');
  container.innerHTML = '';
  const dl = document.getElementById('subjects-datalist');
  dl.innerHTML = '';
  data.subjects.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'snav-btn';
    btn.dataset.subject = s;
    btn.textContent = s;
    btn.onclick = () => showView('subject', s);
    container.appendChild(btn);
    const opt = document.createElement('option'); opt.value = s; dl.appendChild(opt);
  });
}

function openSubjectModal() {
  document.getElementById('new-subject-input').value = '';
  document.getElementById('subject-modal').classList.add('open');
  setTimeout(() => document.getElementById('new-subject-input').focus(), 100);
}
function closeSubjectModal() { document.getElementById('subject-modal').classList.remove('open'); }

function addSubject() {
  const val = document.getElementById('new-subject-input').value.trim();
  if (!val) return;
  const data = getUserData(currentUser);
  if (!data.subjects.includes(val)) {
    data.subjects.push(val);
    saveUserData(currentUser, data);
  }
  closeSubjectModal();
  renderSubjectNav();
  showView('subject', val);
  showToast('📂 Subject "' + val + '" added!');
}

/* ═══════════════════════════════════════════
   NOTES
═══════════════════════════════════════════ */
let editingNoteId = null;

function renderNotesGrid(filterSubject, gridId) {
  const id = gridId || (currentView === 'notes' ? 'notes-grid' : 'subject-notes-grid');
  const grid = document.getElementById(id);
  if (!grid) return;
  const data = getUserData(currentUser);
  let notes = data.notes || [];
  if (filterSubject != null) notes = notes.filter(n => n.subject === filterSubject);
  // Sort newest first
  notes = [...notes].sort((a,b) => b.updatedAt - a.updatedAt);

  if (!notes.length) {
    grid.innerHTML = `<div class="notes-empty"><svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><br>${filterSubject ? 'No notes in this subject yet.' : 'No notes yet. Create your first note!'}</div>`;
    return;
  }
  grid.innerHTML = notes.map((n, i) => {
    const preview = n.text ? n.text.replace(/<[^>]+>/g,'').slice(0,80) : (n.hasDrawing ? '🎨 Drawing' : '');
    const date = new Date(n.updatedAt).toLocaleDateString();
    return `<div class="note-card clr-${i%4}" onclick="openNoteEditor('${n.id}')">
      <div class="note-card-title">${escHtml(n.title || 'Untitled')}</div>
      <div class="note-card-preview">${escHtml(preview) || '<em style="color:var(--muted)">Empty note</em>'}</div>
      <div class="note-card-meta">
        <span class="note-card-date">${date}</span>
        ${n.subject ? `<span class="note-card-subject">${escHtml(n.subject)}</span>` : ''}
        <button class="note-card-del" onclick="deleteNote('${n.id}',event)" title="Delete">🗑</button>
      </div>
    </div>`;
  }).join('');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function deleteNote(id, e) {
  e.stopPropagation();
  if (!confirm('Delete this note?')) return;
  const data = getUserData(currentUser);
  data.notes = data.notes.filter(n => n.id !== id);
  saveUserData(currentUser, data);
  renderNotesGrid(currentView === 'subject' ? currentSubjectView : null, currentView === 'notes' ? 'notes-grid' : 'subject-notes-grid');
  showToast('Note deleted.');
}

function openNoteEditorForSubject() {
  openNoteEditor(null, currentSubjectView);
}

function openNoteEditor(noteId, defaultSubject) {
  editingNoteId = noteId || null;
  const modal = document.getElementById('note-modal');

  // Reset
  document.getElementById('note-title').value = '';
  document.getElementById('note-subject').value = defaultSubject || '';
  document.getElementById('rich-editor').innerHTML = '';
  clearCanvas(true);
  switchEditorTab('text', document.querySelector('.etab'));

  if (noteId) {
    const data = getUserData(currentUser);
    const note = data.notes.find(n => n.id === noteId);
    if (note) {
      document.getElementById('note-title').value = note.title || '';
      document.getElementById('note-subject').value = note.subject || '';
      document.getElementById('rich-editor').innerHTML = note.text || '';
      if (note.drawing) restoreCanvas(note.drawing);
    }
  }
  modal.classList.add('open');
  setTimeout(() => document.getElementById('note-title').focus(), 100);
  resizeCanvas();
}

function closeNoteEditor() {
  document.getElementById('note-modal').classList.remove('open');
  editingNoteId = null;
}

function saveNote() {
  const title = document.getElementById('note-title').value.trim() || 'Untitled';
  const subject = document.getElementById('note-subject').value.trim();
  const text = document.getElementById('rich-editor').innerHTML;
  const drawing = canvasHasContent() ? document.getElementById('draw-canvas').toDataURL() : null;

  const data = getUserData(currentUser);
  if (!data.notes) data.notes = [];

  if (editingNoteId) {
    const idx = data.notes.findIndex(n => n.id === editingNoteId);
    if (idx > -1) {
      data.notes[idx] = { ...data.notes[idx], title, subject, text, drawing, hasDrawing:!!drawing, updatedAt: Date.now() };
    }
  } else {
    const note = { id: 'n' + Date.now(), title, subject, text, drawing, hasDrawing:!!drawing, createdAt:Date.now(), updatedAt:Date.now() };
    data.notes.unshift(note);
  }

  // Auto-add subject if new
  if (subject && !data.subjects.includes(subject)) {
    data.subjects.push(subject);
  }

  saveUserData(currentUser, data);
  closeNoteEditor();
  renderSubjectNav();
  if (currentView === 'notes') renderNotesGrid(null, 'notes-grid');
  else if (currentView === 'subject') renderNotesGrid(currentSubjectView, 'subject-notes-grid');
  showToast('✓ Note saved!');
}

function insertTable() {
  const rows = parseInt(document.getElementById('tbl-rows').value) || 3;
  const cols = parseInt(document.getElementById('tbl-cols').value) || 3;
  let html = '<table><thead><tr>';
  for (let c=0;c<cols;c++) html += `<th>Header ${c+1}</th>`;
  html += '</tr></thead><tbody>';
  for (let r=0;r<rows;r++) {
    html += '<tr>';
    for (let c=0;c<cols;c++) html += '<td>Cell</td>';
    html += '</tr>';
  }
  html += '</tbody></table><p></p>';
  document.getElementById('rich-editor').focus();
  document.execCommand('insertHTML', false, html);
  toggleTablePanel();
}

/* ═══════════════════════════════════════════
   DRAWING CANVAS
═══════════════════════════════════════════ */
let drawTool = 'pen';
let drawColor = '#eeeef8';
let drawSize = 3;
let isDrawing = false;
let drawStart = {};
let drawHistory = [];
let drawSnapshot = null;
const canvas = () => document.getElementById('draw-canvas');
const ctx = () => canvas().getContext('2d');

function resizeCanvas() {
  const c = canvas();
  const box = c.parentElement;
  const w = box ? Math.min(box.offsetWidth - 32, 780) : 760;
  c.width = Math.max(w, 300);
  c.height = 340;
  restoreFromHistory();
}

function setDrawTool(tool, btn) {
  drawTool = tool;
  document.querySelectorAll('.draw-tool-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  canvas().style.cursor = tool === 'eraser' ? 'cell' : (tool === 'text' ? 'text' : 'crosshair');
}

function setColor(el) {
  drawColor = el.dataset.color;
  document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
  el.classList.add('active');
}

document.getElementById('brush-size').addEventListener('input', function() { drawSize = +this.value; });

function getPos(e) {
  const c = canvas();
  const r = c.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return { x: (src.clientX - r.left) * (c.width / r.width), y: (src.clientY - r.top) * (c.height / r.height) };
}

function startDraw(e) {
  e.preventDefault();
  isDrawing = true;
  const pos = getPos(e);
  drawStart = pos;
  const c = ctx();
  c.beginPath(); c.moveTo(pos.x, pos.y);
  if (drawTool === 'text') {
    const txt = prompt('Enter text:');
    if (txt) {
      saveSnapshot();
      c.font = `${Math.max(drawSize * 4, 14)}px 'DM Sans', sans-serif`;
      c.fillStyle = drawColor;
      c.fillText(txt, pos.x, pos.y);
      pushHistory();
    }
    isDrawing = false; return;
  }
  saveSnapshot();
}

function moveDraw(e) {
  if (!isDrawing) return;
  e.preventDefault();
  const pos = getPos(e);
  const c = ctx();
  if (drawTool === 'pen' || drawTool === 'eraser') {
    c.globalCompositeOperation = drawTool === 'eraser' ? 'destination-out' : 'source-over';
    c.strokeStyle = drawColor; c.lineWidth = drawTool === 'eraser' ? drawSize * 3 : drawSize;
    c.lineCap = 'round'; c.lineJoin = 'round';
    c.lineTo(pos.x, pos.y); c.stroke();
  } else {
    // Shape preview
    restoreSnapshot();
    c.globalCompositeOperation = 'source-over';
    c.strokeStyle = drawColor; c.lineWidth = drawSize; c.lineCap = 'round';
    c.beginPath();
    if (drawTool === 'line') { c.moveTo(drawStart.x,drawStart.y); c.lineTo(pos.x,pos.y); c.stroke(); }
    else if (drawTool === 'rect') { c.strokeRect(drawStart.x,drawStart.y,pos.x-drawStart.x,pos.y-drawStart.y); }
    else if (drawTool === 'circle') { const rx=(pos.x-drawStart.x)/2,ry=(pos.y-drawStart.y)/2; c.ellipse(drawStart.x+rx,drawStart.y+ry,Math.abs(rx),Math.abs(ry),0,0,Math.PI*2); c.stroke(); }
  }
}

function endDraw(e) {
  if (!isDrawing) return;
  isDrawing = false;
  pushHistory();
  drawSnapshot = null;
}

function saveSnapshot() { drawSnapshot = ctx().getImageData(0,0,canvas().width,canvas().height); }
function restoreSnapshot() { if (drawSnapshot) ctx().putImageData(drawSnapshot,0,0); }
function pushHistory() { drawHistory.push(ctx().getImageData(0,0,canvas().width,canvas().height)); if (drawHistory.length>30) drawHistory.shift(); }
function undoDraw() { if (!drawHistory.length) return; drawHistory.pop(); restoreFromHistory(); }
function restoreFromHistory() { const c=ctx(); c.clearRect(0,0,canvas().width,canvas().height); if (drawHistory.length) c.putImageData(drawHistory[drawHistory.length-1],0,0); }

function clearCanvas(silent) {
  ctx().clearRect(0,0,canvas().width,canvas().height);
  drawHistory = []; drawSnapshot = null;
  if (!silent) showToast('Canvas cleared');
}

function canvasHasContent() {
  const data = ctx().getImageData(0,0,canvas().width,canvas().height).data;
  return data.some(v => v !== 0);
}

function restoreCanvas(dataURL) {
  const img = new Image();
  img.onload = () => { ctx().drawImage(img,0,0); pushHistory(); };
  img.src = dataURL;
}

const c = canvas();
c.addEventListener('mousedown', startDraw);
c.addEventListener('mousemove', moveDraw);
c.addEventListener('mouseup', endDraw);
c.addEventListener('mouseleave', endDraw);
c.addEventListener('touchstart', startDraw, {passive:false});
c.addEventListener('touchmove', moveDraw, {passive:false});
c.addEventListener('touchend', endDraw);

function switchEditorTab(tab, btn) {
  document.querySelectorAll('.etab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('text-panel').style.display = tab === 'text' ? '' : 'none';

  else dp.classList.remove('show');
}

/* ═══════════════════════════════════════════
   Q&A DATA + RENDER
═══════════════════════════════════════════ */
let activeFilter = 'all';
let openSet = new Set();

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function hl(text, q) {
  if (!q) return text;
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return text.replace(re,'<mark>$1</mark>');
}

function render() {
  const q = (document.getElementById('search').value || '').toLowerCase().trim();
  let filtered = QA.filter(item => {
    const mf = activeFilter === 'all' || item.tags.includes(activeFilter);
    const ms = !q || item.q.toLowerCase().includes(q) || item.body.toLowerCase().includes(q) || item.years.includes(q);
    return mf && ms;
  });
  document.getElementById('result-info').textContent = `Showing ${filtered.length} of ${QA.length} questions`;
  const list = document.getElementById('list');
  if (!filtered.length) { list.innerHTML = '<div class="no-results"><svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><br>No questions match.</div>'; return; }
  let html = ''; let lastCh = null;
  filtered.forEach(item => {
    if (item.chapter !== lastCh) {
      const label = item.chapter === 'ch1' ? '📘 Chapter 1 — E-Commerce' : '🔐 Chapter 2 — Web Security';
      html += `<div class="chapter-divider ${item.chapter}"><div class="chapter-divider-line"></div><div class="chapter-divider-label">${label}</div><div class="chapter-divider-line"></div></div>`;
      lastCh = item.chapter;
    }
    const isOpen = openSet.has(item.id);
    const cats = item.tags.map(t => `<span class="cat-tag ${t}">${t}</span>`).join('');
    const safeBody = item.body.replace(/<table/g,'<div class="table-scroll"><table').replace(/<\/table>/g,'</table></div>');
    html += `<div class="qa-card${isOpen?' open':''}" id="card-${item.id}">
      <div class="qa-header" onclick="toggle('${item.id}')">
        <div class="q-badge">Q${item.id}</div>
        <div class="q-info"><h3>${hl(item.q,q)}</h3><div class="q-meta"><span class="year-tag">${item.years}</span>${cats}</div></div>
        <div class="q-chevron">▾</div>
      </div>
      <div class="qa-body"><div class="qa-body-inner">${safeBody}</div></div>
    </div>`;
  });
  list.innerHTML = html;
}

function toggle(id) {
  if (openSet.has(id)) openSet.delete(id); else openSet.add(id);
  const card = document.getElementById('card-' + id);
  if (card) card.classList.toggle('open', openSet.has(id));
}
